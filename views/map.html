<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Map</title>
    <link rel="icon" type="image/jpeg" href="/favicon.jpg">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            font-family: sans-serif;
            box-sizing: border-box;
        }

        body {
            display: flex;
            flex-direction: column;
            height: 100vh;
            background: #000;
            color: aliceblue;
        }

        h4 {
            padding: .5rem;

        }

        #map {
            height: 100%;
            width: 100%;
        }

        @keyframes signal-pulse-animation {
            0% { opacity: 0.4; filter: drop-shadow(0 0 2px #58a6ff); }
            50% { opacity: 1; filter: drop-shadow(0 0 10px #58a6ff); }
            100% { opacity: 0.4; filter: drop-shadow(0 0 2px #58a6ff); }
        }

        .active-signal-glow {
            animation: signal-pulse-animation 1.2s infinite ease-in-out;
            color: #58a6ff !important;
        }

        @keyframes rotate-radar {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .radar-spinner {
            animation: rotate-radar 2s linear infinite;
            display: inline-block;
            margin-right: 6px;
            color: #58a6ff;
        }
    </style>
</head>

<body>
    <h4 style="display: flex; justify-content: space-between; align-items: center; padding: .5rem 1rem; background: #0d1117; border-bottom: 1px solid #30363d;">
        <div style="display: flex; align-items: center; gap: 12px;">
            <a href="/" style="background: #21262d; border: 1px solid #30363d; color: #c9d1d9; padding: 4px 12px; border-radius: 6px; text-decoration: none; font-size: 13px; display: inline-flex; align-items: center; gap: 6px; font-weight: 500; transition: background 0.2s, color 0.2s;" onmouseover="this.style.background='#30363d'; this.style.color='#ffffff';" onmouseout="this.style.background='#21262d'; this.style.color='#c9d1d9';">
                &larr; Back to Dashboard
            </a>
            <span style="font-size: 14px; color: #8b949e;">ID: <strong id="display-id" style="color: #58a6ff;"></strong></span>
        </div>
        <span style="font-size: 14px;"><a href="https://github.com/developwithAhsan" target="_blank" rel="noopener noreferrer" style="color: #4facfe; text-decoration: none;">Created by Ahsan</a></span>
    </h4>
    <div id="map"></div>


    <script src="https://cdn.jsdelivr.net/npm/socket.io@4.8.1/client-dist/socket.io.min.js"></script>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script>
        const displayId = document.querySelector("#display-id")
        const id = new URLSearchParams(location.search).get("id")
        const latLng = JSON.parse(`{{ data }}`)
        const map = L.map('map').setView(latLng, 12)
        const marker = L.marker(latLng).addTo(map)

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
        }).addTo(map)

        const socket = io("", {
            secure: true,
            path: "/socket.io",
            transports: ['websocket']
        })

        displayId.innerHTML = id
        // on update
        socket.on("map-data", data => {
            if (data.id == id) {
                displayId.innerHTML = `<span class="active-signal-glow"><span class="radar-spinner">📡</span> ${id} - receiving telemetry...</span>`
                marker.setLatLng([data.lat, data.lng])
                map.setView([data.lat, data.lng])

                setTimeout(() => {
                    displayId.innerHTML = id
                }, 2500)
            }
        })
    </script>
</body>

</html>
